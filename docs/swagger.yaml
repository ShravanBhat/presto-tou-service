basePath: /
definitions:
  domain.BulkUpdateRequest:
    properties:
      charger_ids:
        items:
          type: string
        type: array
      schedules:
        items:
          $ref: '#/definitions/domain.TOUSchedule'
        type: array
    type: object
  domain.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  domain.PriceResponse:
    properties:
      charger_id:
        type: string
      local_charger_time:
        type: string
      price_per_kwh:
        type: number
      pricing_period:
        $ref: '#/definitions/domain.PricingPeriod'
      requested_time:
        type: string
    type: object
  domain.PricingPeriod:
    properties:
      end_time:
        type: string
      price_per_kwh:
        type: number
      start_time:
        type: string
    type: object
  domain.TOUSchedule:
    properties:
      end_time:
        description: 'Format: "HH:MM"'
        type: string
      price_per_kwh:
        type: number
      start_time:
        description: 'Format: "HH:MM"'
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is a time-of-use pricing service for EV chargers.
  title: Presto TOU Service API
  version: "1.0"
paths:
  /chargers/{id}/price:
    get:
      consumes:
      - application/json
      description: Get the price for a specific charger at a given timestamp
      parameters:
      - description: Charger ID
        in: path
        name: id
        required: true
        type: string
      - description: Timestamp in ISO8601 format (e.g., 2024-01-15T10:30:00Z)
        in: query
        name: timestamp
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.PriceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Get price for a charger at a specific time
      tags:
      - chargers
  /chargers/{id}/schedules:
    get:
      consumes:
      - application/json
      description: Get all schedules for a specific charger
      parameters:
      - description: Charger ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.TOUSchedule'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Get schedules for a charger
      tags:
      - chargers
    patch:
      consumes:
      - application/json
      description: Update a partial schedule for a specific charger
      parameters:
      - description: Charger ID
        in: path
        name: id
        required: true
        type: string
      - description: Schedule object
        in: body
        name: schedule
        required: true
        schema:
          $ref: '#/definitions/domain.TOUSchedule'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Patch a schedule for a charger
      tags:
      - chargers
    put:
      consumes:
      - application/json
      description: Replace all schedules for a specific charger
      parameters:
      - description: Charger ID
        in: path
        name: id
        required: true
        type: string
      - description: Array of schedules
        in: body
        name: schedules
        required: true
        schema:
          items:
            $ref: '#/definitions/domain.TOUSchedule'
          type: array
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Update all schedules for a charger
      tags:
      - chargers
  /chargers/bulk/schedules:
    post:
      consumes:
      - application/json
      description: Update schedules for multiple chargers
      parameters:
      - description: Bulk update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.BulkUpdateRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Bulk update schedules
      tags:
      - chargers
swagger: "2.0"
